name: Regression Tests

on:
  push:
    branches: [ main ]
  schedule:
    # Run nightly at 03:00 UTC to catch dependency breakage
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  regression:
    name: "Regression (Python ${{ matrix.python }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Test across Python versions
          - os: ubuntu-latest
            python: "3.9"
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          # Test across platforms (latest Python)
          - os: windows-latest
            python: "3.12"
          - os: macos-latest
            python: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        # seaborn is required by scripts/plot_heatmap.py.
        run: pip install numpy matplotlib seaborn pytest pytest-xdist

      - name: Install package
        run: pip install -e .

      - name: Run full test suite
        run: pytest tests/ -v --tb=long -x
